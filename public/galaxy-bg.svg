<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="1" stop-color="#f4f0ff"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7f30ff" stop-opacity="0.42"/>
      <stop offset="35%" stop-color="#5201ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5201ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreHot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#b98bff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7f30ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7f30ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7f30ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>

  <!-- distant nebula haze -->
  <ellipse cx="1250" cy="800" rx="520" ry="360" fill="url(#neb2)" filter="url(#soft)"/>
  <ellipse cx="180" cy="120" rx="380" ry="300" fill="url(#neb2)" filter="url(#soft)"/>

  <!-- galaxy disk + spiral arms, tilted -->
  <g transform="rotate(-22 640 440)">
    <ellipse cx="640" cy="440" rx="560" ry="200" fill="url(#core)" filter="url(#soft)"/>
    <g fill="none" stroke="#5201ff" filter="url(#soft)">
      <ellipse cx="640" cy="440" rx="540" ry="185" stroke-opacity="0.05" stroke-width="2"/>
      <ellipse cx="640" cy="440" rx="430" ry="150" stroke-opacity="0.07" stroke-width="2"/>
      <ellipse cx="640" cy="440" rx="320" ry="112" stroke-opacity="0.10" stroke-width="3"/>
      <ellipse cx="640" cy="440" rx="215" ry="78"  stroke-opacity="0.13" stroke-width="3"/>
    </g>
    <g fill="none" stroke="#7f30ff" stroke-linecap="round" filter="url(#soft)">
      <path d="M640 440 C 820 360, 1050 410, 1180 300" stroke-opacity="0.09" stroke-width="46"/>
      <path d="M640 440 C 470 520, 250 500, 120 600"   stroke-opacity="0.09" stroke-width="46"/>
    </g>
  </g>

  <!-- galactic core -->
  <circle cx="640" cy="440" r="300" fill="url(#core)"/>
  <circle cx="640" cy="440" r="120" fill="url(#coreHot)"/>

  <!-- stars -->
  <g fill="#5201ff">
    <circle cx="180" cy="220" r="1.6" opacity="0.5"/>
    <circle cx="300" cy="140" r="1.1" opacity="0.4"/>
    <circle cx="430" cy="300" r="1.3" opacity="0.55"/>
    <circle cx="520" cy="180" r="0.9" opacity="0.35"/>
    <circle cx="700" cy="150" r="1.4" opacity="0.5"/>
    <circle cx="840" cy="250" r="1.0" opacity="0.4"/>
    <circle cx="980" cy="180" r="1.5" opacity="0.5"/>
    <circle cx="1120" cy="120" r="1.1" opacity="0.4"/>
    <circle cx="1260" cy="230" r="1.3" opacity="0.45"/>
    <circle cx="1400" cy="160" r="0.9" opacity="0.35"/>
    <circle cx="1480" cy="320" r="1.4" opacity="0.5"/>
    <circle cx="1350" cy="420" r="1.0" opacity="0.4"/>
    <circle cx="1180" cy="500" r="1.2" opacity="0.45"/>
    <circle cx="1030" cy="620" r="1.5" opacity="0.5"/>
    <circle cx="900" cy="720" r="1.0" opacity="0.4"/>
    <circle cx="760" cy="820" r="1.3" opacity="0.45"/>
    <circle cx="600" cy="760" r="1.1" opacity="0.4"/>
    <circle cx="470" cy="860" r="1.4" opacity="0.5"/>
    <circle cx="330" cy="700" r="1.0" opacity="0.4"/>
    <circle cx="200" cy="820" r="1.2" opacity="0.45"/>
    <circle cx="120" cy="560" r="1.3" opacity="0.45"/>
    <circle cx="260" cy="460" r="0.9" opacity="0.35"/>
    <circle cx="1500" cy="640" r="1.1" opacity="0.4"/>
    <circle cx="1420" cy="780" r="1.4" opacity="0.5"/>
    <circle cx="1280" cy="900" r="1.0" opacity="0.4"/>
    <circle cx="70" cy="360" r="1.2" opacity="0.45"/>
    <circle cx="960" cy="900" r="1.1" opacity="0.4"/>
    <circle cx="1150" cy="760" r="0.9" opacity="0.35"/>
  </g>
  <g fill="#ffffff">
    <circle cx="620" cy="360" r="1.6" opacity="0.9"/>
    <circle cx="720" cy="500" r="1.3" opacity="0.8"/>
    <circle cx="560" cy="520" r="1.1" opacity="0.75"/>
    <circle cx="800" cy="420" r="1.4" opacity="0.85"/>
    <circle cx="500" cy="400" r="1.0" opacity="0.7"/>
    <circle cx="680" cy="300" r="1.2" opacity="0.8"/>
    <circle cx="880" cy="560" r="1.0" opacity="0.7"/>
  </g>
</svg>
